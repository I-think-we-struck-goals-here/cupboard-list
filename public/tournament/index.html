<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#f4f1e8">
<title>Pool & Ping Pong Tournament</title>
<style>
:root{--bg:#f4f1e8;--card:#fffdf8;--ink:#121212;--muted:#6e706e;--line:#ded9cc;--pool:#146c43;--ping:#1f57c3;--danger:#b52b2b}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,-apple-system,sans-serif}.shell{max-width:1050px;margin:auto;padding:22px 14px 70px}header{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:18px}.eyebrow{margin:0 0 5px;color:var(--muted);font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase}h1,h2{font-family:Georgia,serif;margin:0}h1{font-size:clamp(38px,7vw,64px);line-height:.95;letter-spacing:-.04em}.status{padding:9px 12px;border:1px solid var(--line);border-radius:99px;background:#ffffffa8;color:var(--muted);font-size:13px;font-weight:750;white-space:nowrap}.dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:#c49a1a;margin-right:7px}.dot.live{background:#1c9a58;box-shadow:0 0 0 4px #1c9a581f}.bar{position:sticky;top:8px;z-index:10;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;padding:12px;border:1px solid var(--line);border-radius:20px;background:#fffffff0;box-shadow:0 10px 30px #0000000d}.tabs{display:flex;gap:7px;overflow:auto}.tab,button{font:inherit;border:0;border-radius:99px;padding:10px 14px;font-weight:850;cursor:pointer}.tab{background:#ebe7dc;color:#414240}.tab.active{background:#111;color:white}.tab[data-sport=pool].active{background:var(--pool)}.tab[data-sport=pingpong].active{background:var(--ping)}.identity{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:end;margin:17px 0}label{display:block;color:var(--muted);font-size:12px;font-weight:800;margin:0 0 6px}select,input{width:100%;font:inherit;border:1px solid var(--line);border-radius:13px;background:var(--card);padding:12px;outline:none}.refresh{border:1px solid var(--line);border-radius:13px;background:var(--card);padding:12px 14px}.section-head{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin:24px 2px 11px}h2{font-size:31px}.muted{color:var(--muted);font-size:13px}.round{margin-bottom:22px}.round h3{margin:0 0 9px 2px;color:var(--muted);font-size:13px;letter-spacing:.08em;text-transform:uppercase}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:11px}.card{border:1px solid var(--line);border-radius:19px;background:var(--card);padding:15px;box-shadow:0 6px 20px #0000000b}.card.done{border-color:#24835170}.meta{display:flex;justify-content:space-between;color:var(--muted);font-size:11px;font-weight:800;text-transform:uppercase;margin-bottom:12px}.players{display:grid;grid-template-columns:1fr 62px 16px 62px 1fr;align-items:center;gap:6px}.name{font-weight:900;line-height:1.1}.name.r{text-align:right}.score{text-align:center;font-size:23px;font-weight:900;padding:9px 3px}.dash{text-align:center;color:var(--muted);font-weight:900}.actions{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:12px}.by{color:var(--muted);font-size:11px}.save{background:#111;color:white;border-radius:11px;padding:9px 12px}.clear{background:#f8e9e7;color:var(--danger);border-radius:11px;padding:9px 11px;margin-right:5px}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:19px;background:var(--card)}table{width:100%;min-width:690px;border-collapse:collapse}th,td{padding:12px 10px;text-align:center;border-bottom:1px solid var(--line)}th{font-size:11px;text-transform:uppercase;color:var(--muted)}th:nth-child(2),td:nth-child(2){text-align:left}tr:last-child td{border:0}tr.top{background:#edf7f0;font-weight:800}.empty{text-align:center;color:var(--muted);padding:30px 15px;border:1px solid var(--line);border-radius:19px;background:var(--card)}.finals{display:grid;grid-template-columns:1fr 1fr;gap:12px}.finals .final{grid-column:1/-1}.stage{color:var(--muted);font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}.seed{display:inline-grid;place-items:center;width:22px;height:22px;border-radius:50%;background:#ebe7dc;font-size:11px;margin-right:5px}.champion{margin-top:12px;padding:17px;background:#111;color:white;border-radius:19px;text-align:center}.champion strong{display:block;font:700 30px Georgia,serif;margin-top:4px}.toast{position:fixed;left:50%;bottom:20px;transform:translate(-50%,15px);opacity:0;pointer-events:none;background:#111;color:white;border-radius:99px;padding:11px 15px;font-weight:800;transition:.2s;z-index:50;text-align:center}.toast.show{opacity:1;transform:translate(-50%,0)}.toast.err{background:var(--danger)}.hide{display:none!important}@media(max-width:720px){header{display:block}.status{display:inline-block;margin-top:12px}.grid,.finals{grid-template-columns:1fr}.finals .final{grid-column:auto}.players{grid-template-columns:1fr 52px 13px 52px 1fr}.bar{display:block}.bar .tabs+.tabs{margin-top:8px}}
</style>
</head>
<body><main class="shell">
<header><div><p class="eyebrow">13 players · two trophies</p><h1>Pool & Ping Pong</h1></div><div class="status"><span class="dot" id="dot"></span><span id="status">Connecting</span></div></header>
<div class="bar"><div class="tabs" id="sports"><button class="tab active" data-sport="pool">Pool</button><button class="tab" data-sport="pingpong">Ping Pong</button></div><div class="tabs" id="views"><button class="tab active" data-view="fixtures">Fixtures</button><button class="tab" data-view="table">League table</button><button class="tab" data-view="finals">Finals</button></div></div>
<div class="identity"><div><label for="who">Logging scores as</label><select id="who"></select></div><button class="refresh" id="refresh">Refresh</button></div>
<section id="fixturesView"><div class="section-head"><h2>Fixtures</h2><span class="muted" id="progress"></span></div><div id="fixtures"></div></section>
<section id="tableView" class="hide"><div class="section-head"><h2>League table</h2><span class="muted">Top four qualify</span></div><div id="table"></div><p class="muted">Ranked by win percentage, then average score difference.</p></section>
<section id="finalsView" class="hide"><div class="section-head"><h2>Semi-finals & final</h2><span class="muted">1st v 4th · 2nd v 3rd</span></div><div id="finals"></div></section>
</main><div class="toast" id="toast"></div>
<script>
const S={sport:localStorage.getItem('tour-sport')||'pool',view:localStorage.getItem('tour-view')||'fixtures',players:[],fixtures:{},scores:{}};const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];
const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function toast(m,e=false){let x=$('#toast');x.textContent=m;x.className='toast show'+(e?' err':'');clearTimeout(toast.t);toast.t=setTimeout(()=>x.className='toast',2200)}
function live(ok){$('#dot').classList.toggle('live',ok);$('#status').textContent=ok?'Live online':'Offline'}
async function api(opts={}){let r=await fetch('/api/tournament-state',{headers:{'Content-Type':'application/json'},cache:'no-store',...opts});let d=await r.json();if(!r.ok)throw Error(d.error||'Something went wrong');return d}
async function load(show=false){try{let d=await api();S.players=d.players;S.fixtures=d.fixtures;S.scores=d.scores;setupWho();live(true);render();if(show)toast('Scores refreshed')}catch(e){live(false);if(show)toast(e.message,true)}}
function setupWho(){let s=$('#who'),old=localStorage.getItem('tour-who')||'Zac';if(!s.options.length)s.innerHTML=S.players.map(p=>`<option>${esc(p)}</option>`).join('')+'<option>Guest</option>';s.value=[...s.options].some(o=>o.value===old)?old:'Guest';s.onchange=()=>localStorage.setItem('tour-who',s.value)}
const games=()=>S.fixtures[S.sport]||[];
function standings(){let x=Object.fromEntries(S.players.map(n=>[n,{name:n,p:0,w:0,l:0,f:0,a:0,d:0,av:0,pct:0}]));for(let g of games()){let s=S.scores[g.id];if(!s)continue;let a=+s.p1_score,b=+s.p2_score,u=x[g.p1],v=x[g.p2];u.p++;v.p++;u.f+=a;u.a+=b;v.f+=b;v.a+=a;if(a>b){u.w++;v.l++}else{v.w++;u.l++}}for(let r of Object.values(x)){r.d=r.f-r.a;r.av=r.p?r.d/r.p:0;r.pct=r.p?r.w/r.p:0}return Object.values(x).sort((a,b)=>b.pct-a.pct||b.av-a.av||b.d-a.d||b.f-a.f||a.name.localeCompare(b.name))}
function card(g,stage=''){let s=S.scores[g.id];return `<article class="card${s?' done':''}" data-id="${g.id}">${stage?`<div class="stage">${stage}</div>`:`<div class="meta"><span>Match ${+g.id.split('-').pop()}</span><span>${s?'Completed':'Awaiting score'}</span></div>`}<div class="players"><div class="name">${g.seed1?`<span class="seed">${g.seed1}</span>`:''}${esc(g.p1)}</div><input class="score a" type="number" inputmode="numeric" min="0" max="999" value="${s?s.p1_score:''}"><div class="dash">–</div><input class="score b" type="number" inputmode="numeric" min="0" max="999" value="${s?s.p2_score:''}"><div class="name r">${g.seed2?`<span class="seed">${g.seed2}</span>`:''}${esc(g.p2)}</div></div><div class="actions"><span class="by">${s?`Saved by ${esc(s.entered_by)}`:'Anyone can enter the result'}</span><span>${s?'<button class="clear">Clear</button>':''}<button class="save">Save</button></span></div></article>`}
function bind(){$$('.save').forEach(b=>b.onclick=async()=>{let c=b.closest('[data-id]'),a=c.querySelector('.a').value,z=c.querySelector('.b').value;if(a===''||z==='')return toast('Enter both scores',true);if(+a===+z)return toast('Matches cannot end in a draw',true);b.disabled=true;try{let d=await api({method:'POST',body:JSON.stringify({action:'save',fixture_id:c.dataset.id,p1_score:+a,p2_score:+z,entered_by:$('#who').value})});S.scores=d.scores;render();toast('Score saved')}catch(e){toast(e.message,true)}finally{b.disabled=false}});$$('.clear').forEach(b=>b.onclick=async()=>{let c=b.closest('[data-id]');if(!confirm('Clear this score?'))return;try{let d=await api({method:'POST',body:JSON.stringify({action:'delete',fixture_id:c.dataset.id,entered_by:$('#who').value})});S.scores=d.scores;render();toast('Score cleared')}catch(e){toast(e.message,true)}})}
function renderFixtures(){let gs=games(),done=gs.filter(g=>S.scores[g.id]).length;$('#progress').textContent=`${done} of ${gs.length} completed`;$('#fixtures').innerHTML=[...new Set(gs.map(g=>g.round))].map(r=>`<div class="round"><h3>Round ${r}</h3><div class="grid">${gs.filter(g=>g.round===r).map(g=>card(g)).join('')}</div></div>`).join('')}
function renderTable(){let rows=standings();$('#table').innerHTML=rows.some(r=>r.p)?`<div class="table-wrap"><table><thead><tr><th>Pos</th><th>Player</th><th>P</th><th>W</th><th>L</th><th>For</th><th>Against</th><th>Diff</th><th>Avg</th><th>Win %</th></tr></thead><tbody>${rows.map((r,i)=>`<tr class="${i<4?'top':''}"><td>${i+1}</td><td>${esc(r.name)}</td><td>${r.p}</td><td>${r.w}</td><td>${r.l}</td><td>${r.f}</td><td>${r.a}</td><td>${r.d>0?'+':''}${r.d}</td><td>${r.av.toFixed(2)}</td><td>${Math.round(r.pct*100)}%</td></tr>`).join('')}</tbody></table></div>`:'<div class="empty">The table will appear as scores are entered.</div>'}
function winner(id,a,b){let s=S.scores[id];return s&&a&&b?(+s.p1_score>+s.p2_score?a:b):''}
function renderFinals(){let complete=games().every(g=>S.scores[g.id]),top=complete?standings().slice(0,4).map(r=>r.name):[],p=S.sport,a=top[0]||'',b=top[3]||'',c=top[1]||'',d=top[2]||'',f1=winner(`${p}-sf1`,a,b),f2=winner(`${p}-sf2`,c,d),champ=winner(`${p}-final`,f1,f2);let match=(id,stage,x,y,s1='',s2='')=>x&&y?card({id,p1:x,p2:y,seed1:s1,seed2:s2},stage):`<div class="card"><div class="stage">${stage}</div><div class="empty" style="border:0;padding:18px 0">Waiting for league positions.</div></div>`;$('#finals').innerHTML=`${complete?'':`<div class="empty" style="margin-bottom:12px">Complete all ${games().length} league fixtures to lock the top four.</div>`}<div class="finals">${match(`${p}-sf1`,'Semi-final 1',a,b,'1','4')}${match(`${p}-sf2`,'Semi-final 2',c,d,'2','3')}<div class="final">${match(`${p}-final`,'Final',f1,f2)}</div></div>${champ?`<div class="champion">Champion<strong>${esc(champ)}</strong></div>`:''}`}
function render(){$$('#sports .tab').forEach(b=>b.classList.toggle('active',b.dataset.sport===S.sport));$$('#views .tab').forEach(b=>b.classList.toggle('active',b.dataset.view===S.view));['fixtures','table','finals'].forEach(v=>$(`#${v}View`).classList.toggle('hide',v!==S.view));renderFixtures();renderTable();renderFinals();bind()}
$$('#sports .tab').forEach(b=>b.onclick=()=>{S.sport=b.dataset.sport;localStorage.setItem('tour-sport',S.sport);render()});$$('#views .tab').forEach(b=>b.onclick=()=>{S.view=b.dataset.view;localStorage.setItem('tour-view',S.view);render()});$('#refresh').onclick=()=>load(true);load();setInterval(load,7000);
</script></body></html>
