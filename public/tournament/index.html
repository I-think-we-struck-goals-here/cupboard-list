<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#f4f1e8">
<title>Pool & Ping Pong Tournament</title>
<style>
:root{--bg:#f4f1e8;--card:#fffdf8;--ink:#121212;--muted:#6e706e;--line:#ded9cc;--pool:#146c43;--ping:#1f57c3;--danger:#b52b2b;--warn:#9a6700}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,-apple-system,sans-serif}.shell{max-width:1050px;margin:auto;padding:22px 14px 70px}header{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:18px}.eyebrow{margin:0 0 5px;color:var(--muted);font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase}h1,h2{font-family:Georgia,serif;margin:0}h1{font-size:clamp(38px,7vw,64px);line-height:.95;letter-spacing:-.04em}.status{padding:9px 12px;border:1px solid var(--line);border-radius:99px;background:#ffffffa8;color:var(--muted);font-size:13px;font-weight:750;white-space:nowrap}.dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:#c49a1a;margin-right:7px}.dot.live{background:#1c9a58;box-shadow:0 0 0 4px #1c9a581f}.dot.offline{background:var(--danger)}.bar{position:sticky;top:8px;z-index:10;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;padding:12px;border:1px solid var(--line);border-radius:20px;background:#fffffff0;box-shadow:0 10px 30px #0000000d;backdrop-filter:blur(9px)}.tabs{display:flex;gap:7px;overflow:auto}.tab,button{font:inherit;border:0;border-radius:99px;padding:10px 14px;font-weight:850;cursor:pointer}.tab{background:#ebe7dc;color:#414240}.tab.active{background:#111;color:white}.tab[data-sport=pool].active{background:var(--pool)}.tab[data-sport=pingpong].active{background:var(--ping)}button:disabled{cursor:wait;opacity:.58}.identity{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:end;margin:17px 0}label{display:block;color:var(--muted);font-size:12px;font-weight:800;margin:0 0 6px}select,input{width:100%;font:inherit;border:1px solid var(--line);border-radius:13px;background:var(--card);padding:12px;outline:none}select:focus,input:focus{border-color:#777;box-shadow:0 0 0 3px #11111110}.refresh{border:1px solid var(--line);border-radius:13px;background:var(--card);padding:12px 14px}.section-head{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin:24px 2px 11px}h2{font-size:31px}.muted{color:var(--muted);font-size:13px}.round{margin-bottom:22px}.round h3{margin:0 0 9px 2px;color:var(--muted);font-size:13px;letter-spacing:.08em;text-transform:uppercase}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:11px}.card{border:1px solid var(--line);border-radius:19px;background:var(--card);padding:15px;box-shadow:0 6px 20px #0000000b}.card.done{border-color:#24835170}.card.conflict{border-color:#d69e2e;background:#fffaf0}.meta{display:flex;justify-content:space-between;color:var(--muted);font-size:11px;font-weight:800;text-transform:uppercase;margin-bottom:12px}.players{display:grid;grid-template-columns:1fr 62px 16px 62px 1fr;align-items:center;gap:6px}.name{font-weight:900;line-height:1.1}.name.r{text-align:right}.score{text-align:center;font-size:23px;font-weight:900;padding:9px 3px}.dash{text-align:center;color:var(--muted);font-weight:900}.actions{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:12px}.by{color:var(--muted);font-size:11px;line-height:1.25}.by.warn{color:var(--warn);font-weight:800}.save{background:#111;color:white;border-radius:11px;padding:9px 12px}.clear{background:#f8e9e7;color:var(--danger);border-radius:11px;padding:9px 11px;margin-right:5px}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:19px;background:var(--card)}table{width:100%;min-width:690px;border-collapse:collapse}th,td{padding:12px 10px;text-align:center;border-bottom:1px solid var(--line)}th{font-size:11px;text-transform:uppercase;color:var(--muted)}th:nth-child(2),td:nth-child(2){text-align:left}tr:last-child td{border:0}tr.top{background:#edf7f0;font-weight:800}.empty{text-align:center;color:var(--muted);padding:30px 15px;border:1px solid var(--line);border-radius:19px;background:var(--card)}.finals{display:grid;grid-template-columns:1fr 1fr;gap:12px}.finals .final{grid-column:1/-1}.stage{color:var(--muted);font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}.seed{display:inline-grid;place-items:center;width:22px;height:22px;border-radius:50%;background:#ebe7dc;font-size:11px;margin-right:5px}.champion{margin-top:12px;padding:17px;background:#111;color:white;border-radius:19px;text-align:center}.champion strong{display:block;font:700 30px Georgia,serif;margin-top:4px}.toast{position:fixed;left:50%;bottom:20px;transform:translate(-50%,15px);opacity:0;pointer-events:none;background:#111;color:white;border-radius:99px;padding:11px 15px;font-weight:800;transition:.2s;z-index:50;text-align:center;max-width:min(92vw,600px)}.toast.show{opacity:1;transform:translate(-50%,0)}.toast.err{background:var(--danger)}.hide{display:none!important}@media(max-width:720px){header{display:block}.status{display:inline-block;margin-top:12px}.grid,.finals{grid-template-columns:1fr}.finals .final{grid-column:auto}.players{grid-template-columns:1fr 52px 13px 52px 1fr}.bar{display:block}.bar .tabs+.tabs{margin-top:8px}}
</style>
</head>
<body>
<main class="shell">
<header><div><p class="eyebrow">13 players · two trophies</p><h1>Pool & Ping Pong</h1></div><div class="status"><span class="dot" id="dot"></span><span id="status">Connecting</span></div></header>
<div class="bar"><div class="tabs" id="sports"><button class="tab active" data-sport="pool">Pool</button><button class="tab" data-sport="pingpong">Ping Pong</button></div><div class="tabs" id="views"><button class="tab active" data-view="fixtures">Fixtures</button><button class="tab" data-view="table">League table</button><button class="tab" data-view="finals">Finals</button></div></div>
<div class="identity"><div><label for="who">Logging scores as</label><select id="who"></select></div><button class="refresh" id="refresh">Refresh</button></div>
<section id="fixturesView"><div class="section-head"><h2>Fixtures</h2><span class="muted" id="progress"></span></div><div id="fixtures"></div></section>
<section id="tableView" class="hide"><div class="section-head"><h2>League table</h2><span class="muted">Top four qualify</span></div><div id="table"></div><p class="muted">Ranked by win percentage, then average score difference, total difference and points scored.</p></section>
<section id="finalsView" class="hide"><div class="section-head"><h2>Semi-finals & final</h2><span class="muted">1st v 4th · 2nd v 3rd</span></div><div id="finals"></div></section>
</main>
<div class="toast" id="toast" role="status" aria-live="polite"></div>
<script>
const S={sport:localStorage.getItem('tour-sport')||'pool',view:localStorage.getItem('tour-view')||'fixtures',players:[],fixtures:{},scores:{},version:-1,dirty:new Map(),saving:new Set(),loading:false,lastSync:null};
const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];
const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function toast(message,error=false){const el=$('#toast');el.textContent=message;el.className='toast show'+(error?' err':'');clearTimeout(toast.timer);toast.timer=setTimeout(()=>el.className='toast',2600)}
function setConnection(state){const dot=$('#dot'),label=$('#status');dot.className='dot'+(state==='live'?' live':state==='offline'?' offline':'');if(state==='live'){label.textContent='Live · auto-refreshes every 30s';S.lastSync=Date.now()}else if(state==='offline')label.textContent='Offline · scores not synced';else label.textContent='Connecting'}
async function api(options={}){const controller=new AbortController(),timer=setTimeout(()=>controller.abort(),12000);try{const response=await fetch('/api/tournament-state',{headers:{'Content-Type':'application/json'},cache:'no-store',...options,signal:controller.signal});let data={};try{data=await response.json()}catch{}if(!response.ok){const error=new Error(data.error||`Request failed (${response.status})`);error.status=response.status;error.data=data;throw error}return data}finally{clearTimeout(timer)}}
function hasFocusedScore(){return document.activeElement?.classList?.contains('score')}
function applyPayload(data,{forceRender=false}={}){if(Array.isArray(data.players))S.players=data.players;if(data.fixtures&&typeof data.fixtures==='object')S.fixtures=data.fixtures;const version=Number.isSafeInteger(data.version)?data.version:S.version;if(version<S.version)return false;S.version=version;if(data.scores&&typeof data.scores==='object')S.scores=data.scores;if(forceRender||!hasFocusedScore())render();return true}
async function load(show=false){if(S.loading)return;S.loading=true;try{const data=await api();applyPayload(data);setupWho();setConnection('live');if(show)toast('Scores refreshed')}catch(error){setConnection('offline');if(show)toast(error.name==='AbortError'?'Refresh timed out':error.message,true)}finally{S.loading=false}}
function setupWho(){const select=$('#who'),remembered=localStorage.getItem('tour-who')||'Zac';const wanted=[...S.players,'Guest'];const current=[...select.options].map(option=>option.value);if(JSON.stringify(current)!==JSON.stringify(wanted))select.innerHTML=wanted.map(name=>`<option>${esc(name)}</option>`).join('');select.value=wanted.includes(remembered)?remembered:'Guest';select.onchange=()=>localStorage.setItem('tour-who',select.value)}
const games=()=>S.fixtures[S.sport]||[];
function standings(){const rows=Object.fromEntries(S.players.map(name=>[name,{name,p:0,w:0,l:0,f:0,a:0,d:0,av:0,pct:0}]));for(const game of games()){const score=S.scores[game.id];if(!score)continue;const a=+score.p1_score,b=+score.p2_score,p1=rows[game.p1],p2=rows[game.p2];p1.p++;p2.p++;p1.f+=a;p1.a+=b;p2.f+=b;p2.a+=a;if(a>b){p1.w++;p2.l++}else{p2.w++;p1.l++}}for(const row of Object.values(rows)){row.d=row.f-row.a;row.av=row.p?row.d/row.p:0;row.pct=row.p?row.w/row.p:0}return Object.values(rows).sort((a,b)=>b.pct-a.pct||b.av-a.av||b.d-a.d||b.f-a.f||a.name.localeCompare(b.name))}
function matchingScore(id,p1,p2){const score=S.scores[id];if(!score)return null;if(score.p1&&(score.p1!==p1||score.p2!==p2))return null;return score}
function card(game,stage=''){const saved=matchingScore(game.id,game.p1,game.p2),draft=S.dirty.get(game.id),a=draft?draft.a:saved?saved.p1_score:'',b=draft?draft.b:saved?saved.p2_score:'',remoteChanged=Boolean(draft&&((saved?.updated_at??null)!==draft.base)),busy=S.saving.has(game.id);let note=saved?`Saved by ${esc(saved.entered_by)}`:'Anyone can enter the result';if(remoteChanged)note='Changed on another device. Refresh before saving.';return `<article class="card${saved?' done':''}${remoteChanged?' conflict':''}" data-id="${esc(game.id)}" data-p1="${esc(game.p1)}" data-p2="${esc(game.p2)}">${stage?`<div class="stage">${esc(stage)}</div>`:`<div class="meta"><span>Match ${Number(game.id.split('-').pop())}</span><span>${saved?'Completed':'Awaiting score'}</span></div>`}<div class="players"><div class="name">${game.seed1?`<span class="seed">${game.seed1}</span>`:''}${esc(game.p1)}</div><input class="score a" aria-label="${esc(game.p1)} score" type="number" inputmode="numeric" step="1" min="0" max="999" value="${esc(a)}"><div class="dash">–</div><input class="score b" aria-label="${esc(game.p2)} score" type="number" inputmode="numeric" step="1" min="0" max="999" value="${esc(b)}"><div class="name r">${game.seed2?`<span class="seed">${game.seed2}</span>`:''}${esc(game.p2)}</div></div><div class="actions"><span class="by${remoteChanged?' warn':''}">${note}</span><span>${saved?`<button class="clear" ${busy?'disabled':''}>Clear</button>`:''}<button class="save" ${busy?'disabled':''}>${busy?'Saving…':'Save'}</button></span></div></article>`}
function rememberDraft(cardEl){const id=cardEl.dataset.id,previous=S.dirty.get(id),saved=matchingScore(id,cardEl.dataset.p1,cardEl.dataset.p2);S.dirty.set(id,{a:cardEl.querySelector('.a').value,b:cardEl.querySelector('.b').value,base:previous?previous.base:(saved?.updated_at??null)})}
function handleConflict(error,id){S.dirty.delete(id);if(error.data)applyPayload(error.data,{forceRender:true});toast(error.message||'That match changed on another device. Latest score loaded.',true)}
async function saveCard(cardEl){const id=cardEl.dataset.id,p1=cardEl.dataset.p1,p2=cardEl.dataset.p2;rememberDraft(cardEl);const draft=S.dirty.get(id),a=draft.a,b=draft.b;if(a===''||b==='')return toast('Enter both scores',true);if(!/^\d+$/.test(a)||!/^\d+$/.test(b))return toast('Use whole numbers only',true);if(+a===+b)return toast('Matches cannot end in a draw',true);S.saving.add(id);render();try{const data=await api({method:'POST',body:JSON.stringify({action:'save',fixture_id:id,p1_score:+a,p2_score:+b,p1,p2,expected_updated_at:draft.base,entered_by:$('#who').value})});S.dirty.delete(id);for(const removed of data.invalidated||[])S.dirty.delete(removed);applyPayload(data,{forceRender:true});setConnection('live');toast((data.invalidated||[]).length?'Score saved. Knockout results were reset because the bracket changed.':'Score saved')}catch(error){if(error.status===409)handleConflict(error,id);else{render();setConnection('offline');toast(error.name==='AbortError'?'Save timed out. Refresh to check whether it went through.':error.message,true)}}finally{S.saving.delete(id);render()}}
async function clearCard(cardEl){const id=cardEl.dataset.id,p1=cardEl.dataset.p1,p2=cardEl.dataset.p2,saved=matchingScore(id,p1,p2);if(!saved)return;if(!confirm('Clear this score?'))return;S.saving.add(id);render();try{const data=await api({method:'POST',body:JSON.stringify({action:'delete',fixture_id:id,p1,p2,expected_updated_at:saved.updated_at,entered_by:$('#who').value})});S.dirty.delete(id);for(const removed of data.invalidated||[])S.dirty.delete(removed);applyPayload(data,{forceRender:true});setConnection('live');toast((data.invalidated||[]).length?'Score cleared. Dependent knockout results were also reset.':'Score cleared')}catch(error){if(error.status===409)handleConflict(error,id);else{render();setConnection('offline');toast(error.name==='AbortError'?'Clear timed out. Refresh to check the latest score.':error.message,true)}}finally{S.saving.delete(id);render()}}
function bind(){for(const input of $$('.score'))input.addEventListener('input',event=>rememberDraft(event.target.closest('[data-id]')));for(const button of $$('.save'))button.onclick=()=>saveCard(button.closest('[data-id]'));for(const button of $$('.clear'))button.onclick=()=>clearCard(button.closest('[data-id]'))}
function renderFixtures(){const fixtures=games(),done=fixtures.filter(game=>S.scores[game.id]).length;$('#progress').textContent=`${done} of ${fixtures.length} completed`;$('#fixtures').innerHTML=[...new Set(fixtures.map(game=>game.round))].map(round=>`<div class="round"><h3>Round ${round}</h3><div class="grid">${fixtures.filter(game=>game.round===round).map(game=>card(game)).join('')}</div></div>`).join('')}
function renderTable(){const rows=standings();$('#table').innerHTML=rows.some(row=>row.p)?`<div class="table-wrap"><table><thead><tr><th>Pos</th><th>Player</th><th>P</th><th>W</th><th>L</th><th>For</th><th>Against</th><th>Diff</th><th>Avg</th><th>Win %</th></tr></thead><tbody>${rows.map((row,index)=>`<tr class="${index<4?'top':''}"><td>${index+1}</td><td>${esc(row.name)}</td><td>${row.p}</td><td>${row.w}</td><td>${row.l}</td><td>${row.f}</td><td>${row.a}</td><td>${row.d>0?'+':''}${row.d}</td><td>${row.av.toFixed(2)}</td><td>${Math.round(row.pct*100)}%</td></tr>`).join('')}</tbody></table></div>`:'<div class="empty">The table will appear as scores are entered.</div>'}
function winner(id,p1,p2){const score=matchingScore(id,p1,p2);return score?(+score.p1_score>+score.p2_score?p1:p2):''}
function renderFinals(){const complete=games().every(game=>S.scores[game.id]),top=complete?standings().slice(0,4).map(row=>row.name):[],prefix=S.sport,a=top[0]||'',b=top[3]||'',c=top[1]||'',d=top[2]||'',finalist1=winner(`${prefix}-sf1`,a,b),finalist2=winner(`${prefix}-sf2`,c,d),champion=winner(`${prefix}-final`,finalist1,finalist2);const match=(id,stage,p1,p2,seed1='',seed2='')=>p1&&p2?card({id,p1,p2,seed1,seed2},stage):`<div class="card"><div class="stage">${stage}</div><div class="empty" style="border:0;padding:18px 0">Waiting for league positions.</div></div>`;$('#finals').innerHTML=`${complete?'':`<div class="empty" style="margin-bottom:12px">Complete all ${games().length} league fixtures to lock the top four.</div>`}<div class="finals">${match(`${prefix}-sf1`,'Semi-final 1',a,b,'1','4')}${match(`${prefix}-sf2`,'Semi-final 2',c,d,'2','3')}<div class="final">${match(`${prefix}-final`,'Final',finalist1,finalist2)}</div></div>${champion?`<div class="champion">Champion<strong>${esc(champion)}</strong></div>`:''}`}
function render(){$$('#sports .tab').forEach(button=>button.classList.toggle('active',button.dataset.sport===S.sport));$$('#views .tab').forEach(button=>button.classList.toggle('active',button.dataset.view===S.view));for(const view of ['fixtures','table','finals'])$(`#${view}View`).classList.toggle('hide',view!==S.view);renderFixtures();renderTable();renderFinals();bind()}
$$('#sports .tab').forEach(button=>button.onclick=()=>{S.sport=button.dataset.sport;localStorage.setItem('tour-sport',S.sport);render()});$$('#views .tab').forEach(button=>button.onclick=()=>{S.view=button.dataset.view;localStorage.setItem('tour-view',S.view);render()});$('#refresh').onclick=()=>load(true);window.addEventListener('online',()=>load(true));window.addEventListener('offline',()=>setConnection('offline'));document.addEventListener('visibilitychange',()=>{if(!document.hidden)load()});setConnection('connecting');load();setInterval(()=>{if(!document.hidden&&S.saving.size===0)load()},30000);
</script>
</body>
</html>
